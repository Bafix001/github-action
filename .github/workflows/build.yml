name: Construction d'un projet

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -Dmaven.test.skip=true -B package --file pom.xml

      - name: Check JAR exists
        run: ls -la target/

      - name: Test connectivity
        run: |
          nc -zv 20.250.15.103 22 || echo "Port 22 unreachable"
          curl -s ifconfig.me

      - name: Copy JAR via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "target/github-action-0.0.1-SNAPSHOT.jar"
          target: /home/azureuser/app

      - name: Deploy and run
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            pkill -f "github-action" || true
            nohup java -jar /home/azureuser/app/target/github-action-0.0.1-SNAPSHOT.jar > /home/azureuser/app/app.log 2>&1 &
            echo "App démarrée"