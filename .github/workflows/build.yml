name: Construction d'un projet

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -Dmaven.test.skip=true -B package --file pom.xml

      - name: Check JAR exists
        run: ls -la target/

      - name: Copy JAR via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "target/github-action-0.0.1-SNAPSHOT.jar"
          target: /home/azureuser/app
          strip_components: 1

      - name: Deploy and run
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            pkill -f "github-action-0.0.1" 2>/dev/null || true
            sleep 1
            mkdir -p /home/azureuser/app
            nohup java -jar /home/azureuser/app/github-action-0.0.1-SNAPSHOT.jar \
              --server.port=8080 \
              > /home/azureuser/app/app.log 2>&1 &
            echo $! > /home/azureuser/app/app.pid
            sleep 5
            if ps -p $(cat /home/azureuser/app/app.pid) > /dev/null 2>&1; then
              echo "✅ App démarrée avec PID $(cat /home/azureuser/app/app.pid)"
            else
              echo "❌ App failed to start"
              cat /home/azureuser/app/app.log
              exit 1
            fi